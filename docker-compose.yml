services:
  llm:
    build:
      context: .
      args:
        HF_TOKEN: ${HF_TOKEN}
    ports:
      - "8001:8001"
    gpus: all
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - HF_HOME=/app/models
      - TRANSFORMERS_CACHE=/app/models
      - HF_HUB_CACHE=/app/models/hub
    volumes:
      - .:/app
      - ./models:/app/models
      - ./database:/app/database
    command: uvicorn llm_service:app --host 0.0.0.0 --port 8001
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  clm:
    build:
      context: .
      args:
        HF_TOKEN: ${HF_TOKEN}
    ports:
      - "8080:8080"
    gpus: all
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - HF_HOME=/app/models
      - TRANSFORMERS_CACHE=/app/models
      - HF_HUB_CACHE=/app/models/hub
    volumes:
      - .:/app
      - ./models:/app/models
      - ./database:/app/database
      - ./scenarios.yml:/app/scenarios.yml:ro
    command: uvicorn clm_engine:app --host 0.0.0.0 --port 8080 --reload
    env_file:
      - .env
    depends_on:
      llm:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  ngrok:
    image: ngrok/ngrok:latest
    command: http clm:8080
    ports:
      - "4040:4040"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    depends_on:
      clm:
        condition: service_healthy
    restart: unless-stopped

  tunnel:
    build:
      context: .
      dockerfile: Dockerfile.tunnel
    volumes:
      - "./keys/ivade 1.pem:/root/.ssh/ivade.pem.src:ro"
    command:
      - "-M"
      - "0"
      - "-i"
      - "/root/.ssh/ivade.pem"
      - "-p"
      - "9004"
      - "-o"
      - "StrictHostKeyChecking=no"
      - "-o"
      - "ServerAliveInterval=30"
      - "-o"
      - "ServerAliveCountMax=3"
      - "-o"
      - "ExitOnForwardFailure=yes"
      - "-N"
      - "-R"
      - "9000:clm:8080"
      - "ec2-user@3.24.142.221"
    depends_on:
      clm:
        condition: service_healthy
    environment:
      - AUTOSSH_GATETIME=0
    restart: unless-stopped
