name: Deploy to Barry

on:
  push:
    branches: [dev_docker]

jobs:
  deploy:
    runs-on: self-hosted   # Barry's runner picks this up
    timeout-minutes: 10

    defaults:
      run:
        shell: powershell
        working-directory: C:\Users\user1\Desktop\cloud_llm

    steps:
      - name: Pull latest code
        run: git pull origin dev_docker

      - name: Restart changed services
        run: |
          docker compose restart clm
          Write-Host "CLM restarted"

      - name: Verify health
        run: |
          Start-Sleep -Seconds 5
          try { Invoke-WebRequest -Uri http://localhost:8080/health -UseBasicParsing | Out-Null; Write-Host "CLM OK" } catch { Write-Host "CLM not healthy yet" }
          try { Invoke-WebRequest -Uri http://localhost:8001/health -UseBasicParsing | Out-Null; Write-Host "LLM OK" } catch { Write-Host "LLM not healthy yet (may still be loading)" }
